<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calcul de carré</title>
</head>
<body>
    <script>
        function carre(n) {
            return n * n;
        }

        console.log(carre(5));  // 25
        console.log(carre(-3)); // 9
    </script>
</body>
</html>
    <script>
        function cube(n) {
            return n * n * n;
        }

        console.log(cube(3)); // 27
        console.log(cube(-2)); // -8
    </script>
